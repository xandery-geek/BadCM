config_name: 'badcm.yaml'
data_path: '../data'
module: badcm.badcm
checkpoint: null
dataset: 'NUS-WIDE'
image_size: 384
pattern_img:
  path: 'config/pattern.jpg'
  size: 64
transformer_path: 'checkpoints/vit/vit_base_patch32_384.ckpt'
batch_size: 32
epochs: 200
optim:
  optimizer: 'adam'
  lr: 0.0002
  betas: [0.5, 0.999]
loss:
  region: 10
  alpha: 0.1
  beta: 0.1
device: '0'
valid_interval: 20
sample_batch: 0  # -1 for disable sample images
trial_tag: '0'