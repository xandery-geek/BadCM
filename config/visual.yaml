config_name: 'visual.yaml'
data_path: '../data'
module: badcm.visual
phase: 'train'
checkpoint: null
dataset: 'NUS-WIDE'
image_size: 384
pattern_img:
  mode: 'blend'  # choose from ['patch', 'blend', 'solid']
  path: 'config/pattern.jpg'
  size: 384
transformer_path: 'checkpoints/vit/vit_base_patch32_384.ckpt'
batch_size: 32
epochs: 200
perturbation: true  # generate perturbation directly or poisoned image
epislon: 0.1
optim:
  optimizer: 'adam'
  lr: 0.0002
  betas: [0.5, 0.999]
loss:
  region: 0.2
  alpha: 0.05
  beta: 1.0
device: '0'
valid_interval: 10
sample_batch: 0  # -1 for disable sample images
trial_tag: '0'
